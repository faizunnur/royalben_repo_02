[webservers]
ec2-web-1 ansible_host=10.0.1.10 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/royalben_02.pem
ec2-web-2 ansible_host=10.0.1.11 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/royalben_02.pem
ec2-web-3 ansible_host=10.0.1.12 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/royalben_02.pem

[loadbalancers]
ec2-lb-1 ansible_host=10.0.2.10 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/royalben_02.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
project_name=royalben_02
environment=production
region=us-east-1

[webservers:vars]
nginx_port=80
nginx_ssl_port=443
nginx_worker_processes=auto
nginx_worker_connections=1024
nginx_keepalive_timeout=65
nginx_server_name=royalben_02.example.com
nginx_root=/var/www/royalben_02
nginx_log_dir=/var/log/nginx

[loadbalancers:vars]
nginx_port=80
nginx_ssl_port=443
nginx_upstream_servers=10.0.1.10:80,10.0.1.11:80,10.0.1.12:80
nginx_lb_method=round_robin

[staging]
ec2-staging-1 ansible_host=10.0.3.10 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/royalben_02.pem

[staging:vars]
nginx_port=80
nginx_server_name=staging.royalben_02.example.com
nginx_root=/var/www/royalben_02_staging
environment=staging