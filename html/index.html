<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>royalben_02</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 60, 180, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #8b6fcb;
            background: rgba(99, 60, 180, 0.12);
            border: 1px solid rgba(99, 60, 180, 0.25);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            margin-bottom: 2.5rem;
        }

        .project-name {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #a78bdc 60%, #7c5cbf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #7c5cbf, transparent);
            margin: 0 auto 1.5rem;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #555;
            letter-spacing: 0.05em;
            font-weight: 400;
        }

        .dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle, #1e1e1e 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.6;
        }

        .corner-tag {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="dots"></div>
    <div class="background-glow"></div>

    <div class="container">
        <div class="badge">Project</div>
        <h1 class="project-name">royalben_02</h1>
        <div class="divider"></div>
        <p class="subtitle">Initialized &amp; Ready</p>
    </div>

    <div class="corner-tag">v02</div>

</body>
</html>
